name: Release

# Publish a GitHub Release automatically whenever a v* tag is pushed.
# The same tag push also triggers Xcode Cloud's "Default" workflow, which
# builds/archives the iOS app and delivers it to App Store Connect. This job
# only handles the GitHub Release — it does not build the app.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # actions/checkout can leave refs/tags/<tag> pointing at the commit
          # (lightweight) rather than the annotated tag object, which loses the
          # tag message. Force-fetch the real tag object from origin first.
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"

          # Annotated tag -> first line is the release title, the rest the notes.
          # Lightweight tag (object type is "commit", not "tag") -> let GitHub
          # auto-generate notes from the commits/PRs since the previous tag.
          type="$(git cat-file -t "${TAG}" 2>/dev/null || echo commit)"
          subject="$(git for-each-ref "refs/tags/${TAG}" --format='%(contents:subject)')"
          body="$(git for-each-ref "refs/tags/${TAG}" --format='%(contents:body)')"

          if [ "${type}" = "tag" ] && [ -n "${subject}" ]; then
            gh release create "${TAG}" --title "${subject}" --notes "${body}"
          else
            gh release create "${TAG}" --title "${TAG}" --generate-notes
          fi
