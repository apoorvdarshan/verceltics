name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  catalog-and-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify generated API catalogs
        run: ./scripts/test.sh

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Audit production dependencies
        working-directory: web
        run: npm audit --omit=dev --audit-level=moderate

      - name: Build website
        working-directory: web
        run: npm run build

  ios-tests:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Test iOS app
        run: |
          set -o pipefail
          xcodebuild test \
            -project ios/verceltics.xcodeproj \
            -scheme verceltics \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            -derivedDataPath /tmp/verceltics-ci-derived-data \
            CODE_SIGNING_ALLOWED=NO
